name: Deploy to GitHub Pages

on:
  push:
    branches: [ui-refactor-simple, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: next-version/web-app
        run: npm install

      - name: Build web app
        working-directory: next-version/web-app
        env:
          NODE_ENV: production
          VITE_BASE_PATH: /Codex-Test/
        run: npx vite build --base=/Codex-Test/

      - name: Verify build
        run: |
          if [ ! -f "next-version/web-app/dist/index.html" ]; then
            echo "index.html missing"
            exit 1
          fi
          echo "Build verified"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: next-version/web-app/dist
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
